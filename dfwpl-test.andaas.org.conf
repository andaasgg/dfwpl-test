server {
    listen 80;
    listen [::]:80;
    server_name dfwpl-test.andaas.org;

    root /var/www/dfwpl-test.andaas.org;
    index index.php;

    # Block direct access to JSON data files (contains password hash)
    location /data/ {
        deny all;
        return 404;
    }

    # Block direct access to PHP includes
    location /includes/ {
        deny all;
        return 404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
    }

    location ~ /\.ht {
        deny all;
    }
}
